<!DOCTYPE html>
<html>
  <head>
    <title>Your Totoro Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Your Virtual Totoro Pet!</h1>
    </header>

    <main>
      <section class="pet-image-container">
        <img class="pet-image" src="images/Totoro.gif" alt="Totoro pet">
      </section>

      <section class="dashboard-top">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Strength: <strong><span class="strength"></span></strong></div>
        <div>Happiness: <strong><span class="happiness"></span> leaf wags (per min)</strong></div>
        <div>Hunger: <strong><span class="hunger"></span></strong></div>

        <div class="pet-message-box">
          Totoro says: <strong><span class="message"></span></strong>
        </div>
      </section>

      <section class="dashboard-top">
        <div class="button-container">
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          <button class="nap-button">Nap</button>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
      integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
      crossorigin="anonymous"></script>
    <script src="script.js" defer></script>

    </body>
</html>
